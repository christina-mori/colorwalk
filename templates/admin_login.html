<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ColorWalk Admin Login</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f5f2;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #2f2924;
      padding: 24px;
    }
    .card {
      width: min(420px, 100%);
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0 0 20px;
      color: #7e7368;
      line-height: 1.6;
      font-size: 14px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #6b6158;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #ddd6cf;
      background: #faf8f5;
      font-size: 14px;
      margin-bottom: 14px;
      outline: none;
    }
    input:focus {
      border-color: #a08c78;
    }
    button {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      background: #3a3530;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .error {
      margin-bottom: 12px;
      color: #b54646;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <form class="card" method="post" action="/admin/login">
    <h1>Admin</h1>
    <p>Sign in to review community submissions and curate the public gallery.</p>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <label for="password">Password</label>
    <input id="password" type="password" name="password" required />
    <button type="submit">Enter Admin</button>
  </form>
</body>
</html>
